name: discipline_os
description: AI-Powered Behavioral Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.3.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # AI Integration
  google_generative_ai: ^0.4.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Charts
  fl_chart: ^0.68.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8

  # Logging
  logger: ^2.0.2+1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.2.1

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # Testing
  mockito: ^5.4.4

  # Linting
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/sounds/
    - assets/images/
    - .env
